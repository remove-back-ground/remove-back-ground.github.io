<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In – Snipix AI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet" />  <style>
    :root {
      --blue: #4F8EF7;
      --purple: #7C3AED;
      --gradient: linear-gradient(135deg, #4F8EF7, #7C3AED);
      --dark: #0f0f17;
      --mid: #6b7280;
      --light: #f8fafc;
      --card: #ffffff;
      --border: #e5e7eb;
      --font: 'DM Sans', sans-serif;
      --font-display: 'Syne', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font);
      background: var(--dark);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .bg-orbs { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.15; }
    .orb-1 { width: 400px; height: 400px; background: #4F8EF7; top: -100px; left: -100px; }
    .orb-2 { width: 350px; height: 350px; background: #7C3AED; bottom: -100px; right: -100px; }
    .auth-card {
      background: var(--card); border-radius: 24px; padding: 40px;
      width: 100%; max-width: 420px; position: relative; z-index: 1;
      box-shadow: 0 25px 60px rgba(0,0,0,0.3);
    }
    .logo { display: flex; align-items: center; gap: 8px; justify-content: center; margin-bottom: 28px; }
    .logo-text { font-family: var(--font-display); font-size: 1.2rem; font-weight: 800; color: var(--dark); }
    .logo-ai { background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .auth-title { font-family: var(--font-display); font-size: 1.6rem; font-weight: 800; color: var(--dark); text-align: center; margin-bottom: 6px; }
    .auth-sub { color: var(--mid); text-align: center; font-size: 0.9rem; margin-bottom: 28px; }
    .tabs { display: flex; background: #f3f4f6; border-radius: 12px; padding: 4px; margin-bottom: 24px; }
    .tab { flex: 1; padding: 10px; border: none; background: transparent; border-radius: 9px; font-family: var(--font); font-size: 0.9rem; font-weight: 600; color: var(--mid); cursor: pointer; transition: all 0.2s; }
    .tab.active { background: white; color: var(--dark); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--dark); margin-bottom: 6px; }
    .form-input { width: 100%; padding: 12px 16px; border: 2px solid var(--border); border-radius: 12px; font-family: var(--font); font-size: 0.95rem; color: var(--dark); background: var(--light); transition: border-color 0.2s; outline: none; }
    .form-input:focus { border-color: var(--blue); }
    .btn-submit { width: 100%; padding: 14px; background: var(--gradient); color: white; border: none; border-radius: 12px; font-family: var(--font); font-size: 1rem; font-weight: 700; cursor: pointer; transition: opacity 0.2s, transform 0.1s; margin-top: 4px; }
    .btn-submit:hover { opacity: 0.9; }
    .btn-submit:active { transform: scale(0.98); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
    .divider { display: flex; align-items: center; gap: 12px; color: var(--mid); font-size: 0.82rem; margin: 20px 0; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .btn-google { width: 100%; padding: 12px; background: white; color: var(--dark); border: 2px solid var(--border); border-radius: 12px; font-family: var(--font); font-size: 0.95rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: border-color 0.2s; }
    .btn-google:hover { border-color: var(--blue); }
    .back-link { text-align: center; margin-top: 20px; font-size: 0.88rem; color: var(--mid); }
    .back-link a { color: var(--blue); font-weight: 600; text-decoration: none; }
    .alert { padding: 12px 16px; border-radius: 10px; font-size: 0.88rem; margin-bottom: 16px; display: none; }
    .alert.error { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
    .alert.success { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
    .alert.show { display: block; }
    .spinner-inline { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>

  <div class="auth-card">
    <div class="logo">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <rect width="28" height="28" rx="8" fill="url(#lg)"/>
        <path d="M8 14C8 10.686 10.686 8 14 8s6 2.686 6 6-2.686 6-6 6-6-2.686-6-6z" fill="white" opacity="0.9"/>
        <defs><linearGradient id="lg" x1="0" y1="0" x2="28" y2="28">
          <stop offset="0%" stop-color="#4F8EF7"/>
          <stop offset="100%" stop-color="#7C3AED"/>
        </linearGradient></defs>
      </svg>
      <span class="logo-text">Snipix <span class="logo-ai">AI</span></span>
    </div>

    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Sign in to access your credits</p>

    <div class="tabs">
      <button class="tab active" id="tabLogin" onclick="switchTab('login')">Sign In</button>
      <button class="tab" id="tabSignup" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <div class="alert" id="alertBox"></div>

    <div id="loginForm">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" id="loginEmail" placeholder="you@email.com" />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" id="loginPassword" placeholder="••••••••" />
      </div>
      <button class="btn-submit" id="btnLogin" onclick="doLogin()">Sign In →</button>
    </div>

    <div id="signupForm" style="display:none">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" id="signupEmail" placeholder="you@email.com" />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" id="signupPassword" placeholder="Min 6 characters" />
      </div>
      <button class="btn-submit" id="btnSignup" onclick="doSignup()">Create Account →</button>
    </div>

    <div class="divider">or continue with</div>

    <button class="btn-google" onclick="doGoogle()">
      <svg width="18" height="18" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Continue with Google
    </button>

    <p class="back-link"><a href="index.html">← Back to Snipix AI</a></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    const SUPABASE_URL = 'https://rhnahtyjrnpnrtjrnocp.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_H19x6_h9zIKPkbCSxGC6JQ_eGcM4e8m';
    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function switchTab(tab) {
      document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('signupForm').style.display = tab === 'signup' ? 'block' : 'none';
      document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
      document.getElementById('tabSignup').classList.toggle('active', tab === 'signup');
      hideAlert();
    }

    function showAlert(msg, type = 'error') {
      const el = document.getElementById('alertBox');
      el.textContent = msg;
      el.className = 'alert ' + type + ' show';
    }
    function hideAlert() {
      document.getElementById('alertBox').className = 'alert';
    }

    function setLoading(btnId, loading) {
      const btn = document.getElementById(btnId);
      btn.disabled = loading;
      btn.innerHTML = loading
        ? '<span class="spinner-inline"></span>'
        : btn.id === 'btnLogin' ? 'Sign In →' : 'Create Account →';
    }

    async function doLogin() {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      if (!email || !password) return showAlert('Please fill in all fields');

      setLoading('btnLogin', true);
      const { error } = await client.auth.signInWithPassword({ email, password });
      setLoading('btnLogin', false);

      if (error) return showAlert(error.message);
      showAlert('Signed in! Redirecting...', 'success');
      setTimeout(() => window.location.href = 'index.html', 1000);
    }

    async function doSignup() {
      const email = document.getElementById('signupEmail').value.trim();
      const password = document.getElementById('signupPassword').value;
      if (!email || !password) return showAlert('Please fill in all fields');
      if (password.length < 6) return showAlert('Password must be at least 6 characters');

      setLoading('btnSignup', true);
      const { data, error } = await client.auth.signUp({ email, password });
      setLoading('btnSignup', false);

      if (error) return showAlert(error.message);

      if (data.user) {
        await client.from('profiles').upsert({
          id: data.user.id,
          email: email,
          credits: 3,
          free_used: 0,
          created_at: new Date().toISOString()
        });
      }

      showAlert('Account created! Check your email to confirm.', 'success');
    }

    async function doGoogle() {
      const { error } = await client.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.origin + '/index.html' }
      });
      if (error) showAlert(error.message);
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const loginVisible = document.getElementById('loginForm').style.display !== 'none';
        loginVisible ? doLogin() : doSignup();
      }
    });

    (async () => {
      const { data: { session } } = await client.auth.getSession();
      if (session) window.location.href = 'index.html';
    })();
  </script>
</body>
</html>
