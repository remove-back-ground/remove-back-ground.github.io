<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 – Page Not Found | ClearCut AI</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root { --gradient: linear-gradient(135deg, #4F8EF7, #7C3AED); }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #F8F9FF;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .container { max-width: 480px; }
    .code {
      font-family: 'Syne', sans-serif;
      font-size: 8rem;
      font-weight: 800;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 16px;
    }
    h1 { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 700; color: #0F1117; margin-bottom: 12px; }
    p { color: #6B7280; margin-bottom: 32px; }
    a {
      display: inline-block;
      background: var(--gradient);
      color: white;
      text-decoration: none;
      padding: 12px 28px;
      border-radius: 100px;
      font-weight: 600;
      font-size: 0.95rem;
      box-shadow: 0 8px 24px rgba(99,102,241,0.35);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <a href="/">← Back to ClearCut AI</a>
  </div>
</body>
</html>
